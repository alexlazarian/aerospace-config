# AeroSpace config: workspaces only
# All tiling/layout management is disabled — windows behave like normal macOS windows.
# Only workspace switching and moving windows between workspaces is enabled.

# Start AeroSpace on login
start-at-login = true

# Start every workspace in floating layout so windows are never auto-tiled
after-startup-command = ['layout floating']

# Normalizations don't matter in floating-only mode, but keep them off to be safe
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Update SketchyBar window indicator on focus/workspace changes
on-focus-changed = ['exec-and-forget $HOME/Dev/aerospace-config/update-indicator.sh']
exec-on-workspace-change = ['/bin/bash', '-c', '$HOME/Dev/aerospace-config/update-indicator.sh; $HOME/Dev/aerospace-config/auto-reset.sh']

# New windows inherit floating layout automatically
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Automatically float all new windows
[[on-window-detected]]
run = 'layout floating'

[mode.main.binding]
# Cycle through windows on the current workspace
alt-tab = 'exec-and-forget $HOME/Dev/aerospace-config/cycle-window.sh'
alt-shift-tab = 'exec-and-forget $HOME/Dev/aerospace-config/cycle-window.sh --reverse'

# Workspace switching
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move windows between workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# Reset all windows on current workspace (unminimize + reposition)
alt-shift-r = 'exec-and-forget $HOME/Dev/aerospace-config/reset-windows.sh'

# Reload config
alt-shift-c = 'reload-config'
