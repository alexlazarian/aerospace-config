start-at-login = true

# Normalizations prevent weird tree configurations that can cause windows to get lost
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Update SketchyBar window indicator on focus/workspace changes
on-focus-changed = ['exec-and-forget $HOME/Dev/tools/aerospace-config/update-indicator.sh']
exec-on-workspace-change = ['/bin/bash', '-c', '$HOME/Dev/tools/aerospace-config/update-indicator.sh']

[mode.main.binding]
# Cycle through windows on the current workspace
alt-tab = 'exec-and-forget $HOME/Dev/tools/aerospace-config/cycle-window.sh'
alt-shift-tab = 'exec-and-forget $HOME/Dev/tools/aerospace-config/cycle-window.sh --reverse'

# Open terminal
alt-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

# Focus (wraps around workspace edges)
alt-j = 'focus --boundaries-action wrap-around-the-workspace left'
alt-k = 'focus --boundaries-action wrap-around-the-workspace down'
alt-l = 'focus --boundaries-action wrap-around-the-workspace up'
alt-semicolon = 'focus --boundaries-action wrap-around-the-workspace right'

# Move windows within the tiling layout
alt-shift-j = 'move left'
alt-shift-k = 'move down'
alt-shift-l = 'move up'
alt-shift-semicolon = 'move right'

# Layouts
alt-f = 'fullscreen'
alt-s = 'layout v_accordion'               # stacking
alt-w = 'layout h_accordion'               # tabbed
alt-e = 'layout tiles horizontal vertical' # toggle split
alt-shift-space = 'layout floating tiling' # float toggle

# Workspace switching
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move windows between workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# Reset all windows on current workspace
alt-shift-r = 'exec-and-forget $HOME/Dev/tools/aerospace-config/reset-windows.sh'

alt-shift-c = 'reload-config'

alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'
